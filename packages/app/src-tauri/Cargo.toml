[package]
name = "clarus"
version = "0.4.0"
description = "A precise Tauri desktop advisor for understanding and safely optimizing local disk usage."
authors = ["Gabriel Ulloa <gabriel.ulloa.e@gmail.com>"]
license = "MIT"
repository = "https://github.com/gsulloa/clarus"
homepage = "https://clarus.gulloa.click"
edition = "2021"
rust-version = "1.77"

[lib]
name = "clarus_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
walkdir = "2"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
