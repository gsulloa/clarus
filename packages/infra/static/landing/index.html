<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clarus</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #081014;
        color: #e7eef2;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(120deg, rgba(46, 232, 214, 0.12), transparent 32%),
          #081014;
      }

      main {
        display: grid;
        min-height: 100vh;
        align-content: center;
        width: min(960px, calc(100% - 48px));
        margin: 0 auto;
      }

      svg {
        width: 76px;
        height: 76px;
        margin-bottom: 26px;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(48px, 10vw, 104px);
        line-height: 0.9;
        letter-spacing: 0;
      }

      p {
        max-width: 620px;
        color: #9caeb5;
        font-size: 20px;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-height: 44px;
        border: 1px solid rgba(46, 232, 214, 0.38);
        border-radius: 8px;
        padding: 0 16px;
        color: #061012;
        background: #2ee8d6;
        font-weight: 750;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="96" height="96" rx="22" fill="#081014" />
        <path d="M48 17C31.4315 17 18 30.4315 18 47C18 63.5685 31.4315 77 48 77C61.0636 77 72.1787 68.6488 76.295 57" stroke="#E7EEF2" stroke-width="7" stroke-linecap="round" />
        <path d="M32 62L67 27" stroke="#2EE8D6" stroke-width="7" stroke-linecap="round" />
        <path d="M63 27H69V33" stroke="#2EE8D6" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <h1>Clarus</h1>
      <p>Precise local disk intelligence for reviewing optimization candidates before any file operation.</p>
      <a href="https://releases.clarus.gulloa.click/download.json">Release manifest</a>
    </main>
  </body>
</html>
